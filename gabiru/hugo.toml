baseURL = "https://www.gabiru.art"
languageCode = "pt-br"
title = "gabiru.art"
theme = "hugo-digital-garden-theme"


[params]
  name = "Gabriel Carvalho"
  description = "Artista técnico, game designer & escritor."
  initials = "gabiru.art"
  googleAnalytics = ""

  [[params.social]]
    name = "Github"
    link = "#"
    icon = "fab fa-github"

  [[params.social]]
    name = "Twitter"
    link = "https://twitter.com/gbrlferz"
    icon = "fab fa-twitter"

  [[params.social]]
    name = "Youtube" 
    link = "#"
    icon = "fab fa-youtube"

  [[params.social]]
    name = "LinkedIn"
    link = "#"
    icon = "fab fa-linkedin-in"


[menu]
  [[menu.main]]
    name = "Ensaios"
    url = "/garden/"
    weight = 2
  [[menu.main]]
    name = "Projetos"
    url = "/projects/"
    weight = 1
  [[menu.main]]
    name = "Análises"
    url = "/library/"
    weight = 3
  [[menu.main]]
    name = "Sobre"
    url = "/about/"
    weight = 4


[taxonomies]
  tags = 'tags'
  project_tags = 'project_tags'
  review_tags = 'review_tags'


[markup]
  defaultMarkdownHandler = 'goldmark'
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions]
    definitionList = true
    footnote = true
    linkify = true
    strikethrough = true
    table = true
    taskList = true
    typographer = true
  [markup.highlight]
    # Choose from https://xyproto.github.io/splash/docs/all.html
    style = 'monokailight'