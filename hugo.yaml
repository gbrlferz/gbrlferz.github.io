# Hugo configuration file
title: Gabiru
logo: images/gabiru.svg

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - identifier: projetos
      name: Projetos
      pageRef: /projetos
      weight: 1
    - identifier: textos
      name: Textos
      pageRef: /textos
      weight: 3
    - identifier: sobre
      name: Sobre
      pageRef: /sobre
      weight:  4
    - name: Pesquisar
      weight: 5
      params:
        type: search
    - name: Youtube
      url: "https://www.youtube.com/@Gabiru.mp4"
      weight: 6
      params:
        icon: youtube
    - name: Instagram
      weight: 7
      url: "https://www.instagram.com/gabiruh.art/"
      params:
        icon: instagram
    - name: GitHub
      weight: 8
      url: "https://github.com/gbrlferz"
      params:
        icon: github
    - name: LinkedIn
      weight: 9
      url: "https://www.linkedin.com/in/gbrlferz/"
      params:
        icon: linkedin

defaultContentLanguage: pt

languages:
  pt:
    languageName: Português
    weight: 1
  en:
    languageName: English
    weight: 2

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/gabiru.svg
      dark: images/gabiru_dark.svg
      # link: /
      width: 30
      heigth: 30

  footer:
    displayCopyright: true
    displayPoweredBy: false
